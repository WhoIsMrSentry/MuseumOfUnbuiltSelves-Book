<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Mystory Archives</title>
    <script type="text/javascript">
      // This script checks if a redirect is present in the query string and converts it back into a single-page app route
      // It allows us to use standard routing on GitHub Pages without hash URLs.
      var pathSegmentToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentToKeep).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + pathSegmentToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
